spring:
  application:
    name: meeting-room-management
  profiles:
    active: dev
  messages:
    basename: messages
    use-code-as-default-message: true
    encoding: UTF-8
    fallback-to-system-locale: false

  web:
    locale: tr
    locale-resolver: accept_header

server:
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, loggers, circuitbreakers